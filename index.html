<!DOCTYPE html>

<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Training Log</title>

<style>
body{
  font-family: system-ui, -apple-system, Arial;
  background:#111;
  color:#eee;
  margin:0;
  padding:0;
}

.container{
  max-width:700px;
  margin:auto;
  padding:16px;
}

.card{
  background:#1c1c1c;
  border-radius:12px;
  padding:14px;
  margin-bottom:12px;
}

.sec-label{
  font-weight:600;
  margin:20px 0 8px;
}

.plan-day{
  padding:8px 0;
  border-bottom:1px solid #333;
}

.plan-day:last-child{
  border-bottom:none;
}

.day-title{
  font-weight:600;
  margin-bottom:4px;
}

.tags span{
  background:#2c2c2c;
  padding:3px 8px;
  border-radius:6px;
  font-size:12px;
  margin-right:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>Training app</h2>

<div class="sec-label">Navrhovaný plán</div>
<div id="suggestedPlan" class="card"></div>

</div>

<script>

const CFG = {

day_labels_full:[
"Nedeľa",
"Pondelok",
"Utorok",
"Streda",
"Štvrtok",
"Piatok",
"Sobota"
],

weekly_targets:{
core:4,
mobility:3,
strength:3,
legs:2
}

};

let cachedLogs=[];

function safeRender(id,fn){
  try{
    fn();
  }catch(e){
    console.error(e);
    const el=document.getElementById(id);
    if(el){
      el.innerHTML="<div>Chyba renderovania</div>";
    }
  }
}

function renderHomeScreen(){
  safeRender("suggestedPlan",renderSuggestedPlan);
}

function todayDate(){
  const d=new Date();
  return new Date(d.getFullYear(),d.getMonth(),d.getDate());
}

function getWeekStats(){
  return{
    core:2,
    mobility:1,
    strength:1,
    legs:0
  };
}

function pickDayAreas(stats){

  const res=[];

  if(stats.strength<CFG.weekly_targets.strength){
    res.push("Silový tréning");
  }

  if(stats.legs<CFG.weekly_targets.legs){
    res.push("Nohy");
  }

  if(stats.core<CFG.weekly_targets.core){
    res.push("Core");
  }

  if(stats.mobility<CFG.weekly_targets.mobility){
    res.push("Mobilita");
  }

  return res.slice(0,3);

}

function renderSuggestedPlan(){

  const el=document.getElementById("suggestedPlan");
  const stats=getWeekStats();

  let html="";

  for(let i=0;i<=2;i++){

    const d=new Date();
    d.setDate(d.getDate()+i);

    const dayName=CFG.day_labels_full[d.getDay()];
    const label=i===0?dayName+" – Dnes":dayName;

    const areas=pickDayAreas(stats);

    html+=`
    <div class="plan-day">
      <div class="day-title">${label}</div>
      <div class="tags">
        ${areas.map(a=>"<span>"+a+"</span>").join("")}
      </div>
    </div>
    `;

  }

  el.innerHTML=html;

}

renderHomeScreen();

</script>

</body>
</html>
